
services:
  # FastAPI App
  app:
    build: .
    container_name: jojoba-api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=true
      - RELOAD=true
      - WEBHOOK_API_KEY=jojoba-webhook-key-2024
      - DATABASE_URL=mongodb://host.docker.internal:27017/
      - REDIS_URL=redis://redis:6379
      - DB_NAME=llmautomationai
    depends_on:
      - redis
    networks:
      - jojoba-network
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Redis
  redis:
    image: redis:latest
    container_name: jojoba-redis
    ports:
      - "6379:6379"
    networks:
      - jojoba-network
    volumes:
      - redis_data:/data

  # n8n
  n8n:
    image: n8nio/n8n:latest
    container_name: jojoba-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_WEBHOOK_URL=http://host.docker.internal:5678
      - N8N_EDITOR_BASE_URL=http://localhost:5678
      - DB_TYPE=sqlite
      - GENERIC_FUNCTION_ALLOWLIST=Math.random,Math.floor
    networks:
      - jojoba-network
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n:/etc/n8n

networks:
  jojoba-network:
    driver: bridge

volumes:
  redis_data:
  n8n_data: